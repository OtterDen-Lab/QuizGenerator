name: Release On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Validate And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -n 1)"
          if [[ "${tag_version}" != "${project_version}" ]]; then
            echo "Tag version (${tag_version}) does not match pyproject version (${project_version})."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Typst
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          ASSET_URL=$(python - <<'PY'
          import json
          import urllib.request

          url = "https://api.github.com/repos/typst/typst/releases/latest"
          data = json.load(urllib.request.urlopen(url))
          asset_url = None
          for asset in data.get("assets", []):
              name = asset.get("name", "").lower()
              if "linux" in name and ("x86_64" in name or "amd64" in name):
                  if name.endswith((".tar.xz", ".tar.gz")):
                      asset_url = asset.get("browser_download_url")
                      break
          if not asset_url:
              raise SystemExit("No suitable Typst asset found.")
          print(asset_url)
          PY
          )
          curl -fsSL -o /tmp/typst.tar "$ASSET_URL"
          rm -rf /tmp/typst && mkdir -p /tmp/typst
          tar -xf /tmp/typst.tar -C /tmp/typst
          TYPST_BIN=$(find /tmp/typst -type f -name typst | head -n 1)
          if [ -z "$TYPST_BIN" ]; then
            echo "Typst binary not found in archive."
            exit 1
          fi
          cp "$TYPST_BIN" "$HOME/.local/bin/typst"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          typst --version

      - name: Run repository hygiene checks
        run: bash scripts/check_repo_hygiene.sh

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke test (safe sample)
        run: |
          uv run quizgen generate --yaml example_files/example_exam_safe.yaml --num-pdfs 1
          ls out/*.pdf

      - name: Smoke test (FromGenerator sample)
        run: |
          export QUIZGEN_ALLOW_GENERATOR=1
          uv run quizgen generate --allow-generator --yaml example_files/example_exam.yaml --num-pdfs 1
          ls out/*.pdf

      - name: Vendor LMSInterface for release build
        run: python scripts/vendor_lms_for_release.py

      - name: Build distributions
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
